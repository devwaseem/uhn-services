apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: uhn-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: "OnRootMismatch"
      imagePullSecrets:
        - name: aws-ecr-secret
      terminationGracePeriodSeconds: 300
      containers:
        - name: celery
          image: 302579735403.dkr.ecr.ca-central-1.amazonaws.com/uhn-services:0.4.2
          envFrom:
            - configMapRef:
                name: uhn-services-configmap
            - secretRef:
                name: uhn-services-secrets
          env:
            - name: DEBUG
              value: "false"
            - name: DJANGO_SETTINGS_MODULE
              value: "app.settings.prod"
            - name: DJANGO_DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-managed-17-credentials
                  key: hostname
            - name: DJANGO_DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: postgres-managed-17-credentials
                  key: port
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-managed-17-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-managed-17-credentials
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-managed-17-credentials
                  key: dbname
          command: ["celery"]
          args:
            - "--app"
            - "app"
            - "worker"
            - "--hostname"
            - "worker@%h"
            - "-E"
            - "-l"
            - "INFO"
            - "-Q"
            - "celery"
            - "--pool"
            - "prefork"
            - "--concurrency"
            - "4"
