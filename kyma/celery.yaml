apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: uhn-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: "OnRootMismatch"
      imagePullSecrets:
        - name: aws-ecr-secret
      terminationGracePeriodSeconds: 300
      containers:
        - name: celery
          image: 302579735403.dkr.ecr.ca-central-1.amazonaws.com/uhn-services:0.3.2
          envFrom:
            - configMapRef:
                name: uhn-services-configmap
            - secretRef:
                name: uhn-services-secrets
          env:
            - name: DEBUG
              value: "false"
            - name: DJANGO_SETTINGS_MODULE
              value: "app.settings.prod"
          command: ["celery"]
          args:
            - "--app"
            - "app"
            - "worker"
            - "--hostname"
            - "worker@%h"
            - "-E"
            - "-l"
            - "INFO"
            - "-Q"
            - "celery"
            - "--pool"
            - "prefork"
            - "--concurrency"
            - "4"
